<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevDocs | Patterns</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="topnav">
  <div class="nav-logo">Dev<span>Docs</span></div>
  <a href="index.html">Home</a>
  <a href="patterns.html" class="active">Patterns</a>
  <a href="search.html">Search</a>
  <button id="themeBtn" onclick="toggleTheme()">☀ Light</button>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Architecture <span class="accent">Patterns</span></h1>
    <p>Code snippets, architecture diagrams & trade-off analysis for all 16 patterns.</p>
  </div>

  <div class="search-wrap">
    <input id="patternSearch" class="search-input" type="text"
      placeholder="Search by name, scale (1M users), latency, or tech stack..."/>
  </div>
  <p class="meta" id="patternMeta">Showing all 16 patterns</p>
  <div class="grid" id="patternGrid"></div>
</div>

<script src="script.js"></script>
<script>
function renderDetailed(list) {
  const grid = document.getElementById('patternGrid');
  document.getElementById('patternMeta').textContent =
    list.length === patterns.length
      ? `Showing all ${patterns.length} patterns`
      : `${list.length} result${list.length !== 1 ? 's' : ''} found`;

  if (!list.length) {
    grid.innerHTML = `<p style="color:var(--text-dim);grid-column:1/-1;font-family:var(--mono);font-size:13px;padding:40px 0;">No patterns found.</p>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const idx   = patterns.indexOf(p);
    const techs = p.tech.split(',').map(t => `<span class="tech-badge">${t.trim()}</span>`).join('');
    return `
      <div class="card">
        <span class="card-tag">${p.tag}</span>
        <h3>${p.name}</h3>
        <p class="scale">📈 ${p.scale}</p>
        <div class="tech-list">${techs}</div>
        <p class="pros">✅ ${p.pros}</p>
        <p class="cons">❌ ${p.cons}</p>
        <div class="arch-box">${p.arch}</div>
        <button class="toggle-btn" onclick="toggleSnippet(${idx},this)">{ } Show Code</button>
        <pre class="code-box" id="snip-${idx}">${escHtml(p.snippet)}</pre>
        <div class="card-footer" style="margin-top:16px;">
          <span class="latency">⏱ ${p.latency} latency</span>
          <span class="cost">${p.cost}</span>
        </div>
      </div>`;
  }).join('');
}

function toggleSnippet(idx, btn) {
  const box  = document.getElementById('snip-' + idx);
  const open = box.style.display === 'block';
  box.style.display = open ? 'none' : 'block';
  btn.textContent   = open ? '{ } Show Code' : '{ } Hide Code';
}

renderDetailed(patterns);
syncThemeBtn();

document.getElementById('patternSearch').addEventListener('input', function () {
  renderDetailed(filterPatterns(this.value.trim()));
});
</script>
</body>
</html>
